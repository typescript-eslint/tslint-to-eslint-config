description: Prepares the repo for a typical CI job

name: Prepare

runs:
    steps:
        - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
          with:
              cache: npm
              node-version: 24.18.0
        - run: npm ci
          shell: bash
    using: composite
